<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventures per a l'Aeris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <header>
                <h1 style="font-size: 3.5rem; margin-bottom: 20px; text-align: center; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Benvingut/da a l'Aventura!</h1>
            </header>
            <div style="text-align: center; margin-top: 20px;">
                <p style="font-size: 1.8rem; margin-bottom: 20px;">Com et dius?</p>
                <input type="text" id="player-name-input" placeholder="Escriu el teu nom..." style="font-size: 1.5rem; padding: 15px; border-radius: 15px; border: 2px solid var(--primary-color); background: var(--glass-bg); color: white; width: 80%; max-width: 300px; text-align: center; font-family: 'Outfit', sans-serif; margin-bottom: 30px;">
                <br>
                <button id="btn-submit-name" class="primary-btn" style="padding: 15px 40px; font-size: 1.5rem;">Som-hi! 🚀</button>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen">
            <header>
                <h1 id="menu-title">✨ Aventures de Robòtica ✨</h1>
            </header>
            
            <p style="font-size: 1.2rem; margin-bottom: 10px;">Escull el teu personatge:</p>
            <div class="avatar-selector">
                <button class="avatar-btn selected" data-avatar="turtle" data-emoji="🐢" data-goal="🥬">
                    <span class="avatar-emoji">🐢</span>
                    <span class="avatar-name">Tortuga</span>
                </button>
                <button class="avatar-btn" data-avatar="ballerina" data-emoji="💃" data-goal="🎵">
                    <span class="avatar-emoji">💃</span>
                    <span class="avatar-name">Ballerina</span>
                </button>
                <button class="avatar-btn" data-avatar="robot" data-emoji="🛵" data-goal="🔋">
                    <span class="avatar-emoji">🛵</span>
                    <span class="avatar-name">Moto Kawaii</span>
                </button>
                <button class="avatar-btn" data-avatar="space" data-emoji="🚀" data-goal="⭐">
                    <span class="avatar-emoji">🚀</span>
                    <span class="avatar-name">Nau</span>
                </button>
                <button class="avatar-btn" data-avatar="rumi" data-emoji="🐱" data-goal="🍜">
                    <span class="avatar-emoji">🐱</span>
                    <span class="avatar-name">Rumi</span>
                </button>
            </div>

            <p style="margin-top: 10px; font-size: 1.2rem; margin-bottom: 10px;">Com vols jugar?</p>
            <div class="mode-selector">
                <button class="mode-btn selected" data-mode="programming">
                    <div class="mode-icon">🤖</div>
                    <div class="mode-title">Programació</div>
                    <div class="mode-desc">Crea una seqüència de passos</div>
                </button>
                <button class="mode-btn" data-mode="piloting">
                    <div class="mode-icon">🎮</div>
                    <div class="mode-title">Pilotatge</div>
                    <div class="mode-desc">Mou-te lliurement amb les fletxes</div>
                </button>
            </div>

            <div class="start-buttons">
                <button id="btn-start-normal" class="primary-btn big-start-btn">▶️ Jugar Aventura <br><span style="font-size:1rem; font-weight:normal">(Ordre Normal)</span></button>
                <button id="btn-start-random" class="secondary-btn big-start-btn">🎲 Nivell Aleatori</button>
            </div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <header class="game-header">
                <button id="btn-back" class="icon-btn">🔙 Inici</button>
                <h2 id="level-title">Nivell 1</h2>
                <div class="score">⭐ <span id="score-val">0</span></div>
            </header>

            <div class="game-area">
                <!-- Grid Area -->
                <div class="grid-container">
                    <div id="grid"></div>
                </div>

                <!-- Controls Area -->
                <div class="controls-panel glass-panel">
                    
                    <!-- Programming Controls -->
                    <div id="prog-controls" class="control-view">
                        <div class="pilot-pad" style="margin-top: 0;">
                            <div class="pad-row">
                                <button class="cmd-btn prog-btn" data-cmd="up">⬆️</button>
                            </div>
                            <div class="pad-row">
                                <button class="cmd-btn prog-btn" data-cmd="left">⬅️</button>
                                <button class="cmd-btn prog-btn" data-cmd="down">⬇️</button>
                                <button class="cmd-btn prog-btn" data-cmd="right">➡️</button>
                            </div>
                        </div>

                        <div class="sequence-queue-wrapper">
                            <div id="sequence-queue">
                                <!-- Commands will appear here -->
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button id="btn-clear" class="danger-btn">🗑️</button>
                            <button id="btn-play" class="primary-btn">▶️ GO!</button>
                        </div>
                    </div>

                    <!-- Piloting Controls -->
                    <div id="pilot-controls" class="control-view hidden">
                        <p style="text-align: center; margin-bottom: 10px; font-size: 1.2rem;">Fes servir el teclat o els botons!</p>
                        <div class="pilot-pad">
                            <div class="pad-row">
                                <button class="cmd-btn pilot-btn" data-cmd="up">⬆️</button>
                            </div>
                            <div class="pad-row">
                                <button class="cmd-btn pilot-btn" data-cmd="left">⬅️</button>
                                <button class="cmd-btn pilot-btn" data-cmd="down">⬇️</button>
                                <button class="cmd-btn pilot-btn" data-cmd="right">➡️</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            
            <!-- Success Modal -->
            <div id="success-modal" class="modal hidden">
                <div class="modal-content glass-panel">
                    <h2>🎉 Visca! 🎉</h2>
                    <p id="success-message">Ho has aconseguit!</p>
                    <button id="btn-next-level" class="primary-btn">Següent ➡️</button>
                </div>
            </div>
            
            <!-- Fail Modal -->
            <div id="fail-modal" class="modal hidden">
                <div class="modal-content glass-panel">
                    <h2>💥 Ui! 💥</h2>
                    <p id="fail-message">No hem arribat a l'objectiu.</p>
                    <button id="btn-retry" class="primary-btn">🔄 Tornem-hi</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
